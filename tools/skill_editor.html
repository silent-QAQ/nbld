<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>技能编辑器</title>
  <style>
    :root {
      --bg: #eef1ed;
      --panel: #fbfcf8;
      --panel-2: #f3f6f0;
      --ink: #16201d;
      --muted: #61706b;
      --line: #ccd7d0;
      --accent: #216a5b;
      --accent-2: #b6422f;
      --accent-3: #d99f2b;
      --good: #1f7a45;
      --bad: #b3362d;
      --shadow: 0 12px 26px rgba(22, 32, 29, 0.08);
      --mono: "SFMono-Regular", "Cascadia Mono", "Liberation Mono", monospace;
      --sans: "Trebuchet MS", "Avenir Next", "Segoe UI", sans-serif;
    }

    * {
      box-sizing: border-box;
    }

    html,
    body {
      height: 100%;
    }

    body {
      margin: 0;
      background:
        linear-gradient(135deg, rgba(33, 106, 91, 0.08), transparent 36%),
        linear-gradient(315deg, rgba(217, 159, 43, 0.14), transparent 32%),
        var(--bg);
      color: var(--ink);
      font-family: var(--sans);
      font-size: 14px;
      line-height: 1.45;
    }

    button,
    input,
    select,
    textarea {
      font: inherit;
    }

    button {
      border: 1px solid var(--line);
      background: #fff;
      color: var(--ink);
      min-height: 34px;
      padding: 7px 11px;
      cursor: pointer;
    }

    button:hover {
      border-color: var(--accent);
    }

    button.primary {
      background: var(--accent);
      border-color: var(--accent);
      color: white;
    }

    button.danger {
      color: var(--bad);
    }

    input,
    select,
    textarea {
      width: 100%;
      border: 1px solid var(--line);
      background: white;
      color: var(--ink);
      padding: 8px 9px;
      min-height: 34px;
      outline: none;
    }

    textarea {
      min-height: 84px;
      resize: vertical;
    }

    input:focus,
    select:focus,
    textarea:focus {
      border-color: var(--accent);
      box-shadow: 0 0 0 3px rgba(33, 106, 91, 0.12);
    }

    .app {
      min-height: 100%;
      display: grid;
      grid-template-rows: auto 1fr;
    }

    .topbar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 16px;
      padding: 14px 18px;
      border-bottom: 1px solid rgba(204, 215, 208, 0.9);
      background: rgba(251, 252, 248, 0.88);
      backdrop-filter: blur(10px);
      position: sticky;
      top: 0;
      z-index: 5;
    }

    .brand {
      display: flex;
      align-items: baseline;
      gap: 12px;
      min-width: 0;
    }

    .brand h1 {
      font-size: 18px;
      line-height: 1;
      margin: 0;
      white-space: nowrap;
    }

    .brand span {
      color: var(--muted);
      font-size: 12px;
      white-space: nowrap;
    }

    .top-actions {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
      justify-content: flex-end;
    }

    .workspace {
      display: grid;
      grid-template-columns: minmax(320px, 0.95fr) minmax(420px, 1.4fr) minmax(360px, 1.05fr);
      gap: 14px;
      padding: 14px;
      align-items: start;
    }

    .panel {
      background: rgba(251, 252, 248, 0.94);
      border: 1px solid var(--line);
      box-shadow: var(--shadow);
      min-width: 0;
    }

    .panel-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 10px;
      padding: 12px;
      border-bottom: 1px solid var(--line);
      background: var(--panel-2);
    }

    .panel-header h2 {
      margin: 0;
      font-size: 14px;
    }

    .panel-body {
      padding: 12px;
    }

    .form-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
    }

    .field {
      display: grid;
      gap: 5px;
      min-width: 0;
    }

    .field.full {
      grid-column: 1 / -1;
    }

    label {
      color: var(--muted);
      font-size: 12px;
    }

    .chips {
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
    }

    .chip {
      display: inline-flex;
      align-items: center;
      gap: 5px;
      border: 1px solid var(--line);
      background: #fff;
      padding: 5px 7px;
      font-size: 12px;
      user-select: none;
    }

    .chip input {
      width: auto;
      min-height: auto;
      margin: 0;
    }

    .section {
      display: grid;
      gap: 10px;
      margin-bottom: 14px;
    }

    .section:last-child {
      margin-bottom: 0;
    }

    .toolbar {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      align-items: center;
    }

    .line-list {
      display: grid;
      gap: 10px;
    }

    .skill-line {
      border: 1px solid var(--line);
      background: #fff;
    }

    .skill-line.selected {
      border-color: var(--accent);
      box-shadow: inset 4px 0 0 var(--accent);
    }

    .builder-card .skill-line {
      box-shadow: none;
      background: #fbfcf8;
    }

    .line-head {
      display: flex;
      gap: 8px;
      justify-content: space-between;
      align-items: center;
      padding: 9px 10px;
      background: #f8faf6;
      border-bottom: 1px solid var(--line);
    }

    .line-title {
      min-width: 0;
      font-family: var(--mono);
      font-size: 12px;
      color: var(--ink);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .line-actions {
      display: flex;
      gap: 6px;
      flex: 0 0 auto;
    }

    .line-actions button {
      width: 30px;
      min-height: 28px;
      padding: 0;
    }

    .line-body {
      display: grid;
      gap: 9px;
      padding: 10px;
    }

    .compiled-line {
      padding: 8px;
      background: #17211e;
      color: #dfe9e4;
      font-family: var(--mono);
      font-size: 12px;
      overflow-x: auto;
      white-space: nowrap;
    }

    .pill-row {
      display: flex;
      gap: 6px;
      flex-wrap: wrap;
    }

    .pill {
      background: #e9f0ec;
      border: 1px solid #c9d8d0;
      color: #24463d;
      padding: 4px 7px;
      font-size: 12px;
    }

    .pill.warn {
      background: #fbefd7;
      border-color: #e5c274;
      color: #694c12;
    }

    .pill.bad {
      background: #f8dfda;
      border-color: #e1aaa0;
      color: #81291f;
    }

    .builder {
      display: grid;
      gap: 12px;
    }

    .builder-card {
      border: 1px solid var(--line);
      background: #fff;
      padding: 10px;
      display: grid;
      gap: 10px;
    }

    .builder-card h3 {
      margin: 0;
      font-size: 13px;
    }

    .effect-grid {
      display: grid;
      grid-template-columns: repeat(3, minmax(0, 1fr));
      gap: 8px;
    }

    .effect-button {
      min-height: 50px;
      text-align: left;
      display: grid;
      gap: 2px;
      align-content: center;
      background: #fff;
    }

    .effect-button strong {
      font-size: 12px;
    }

    .effect-button span {
      color: var(--muted);
      font-size: 11px;
    }

    .output-tabs {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 0;
      border-bottom: 1px solid var(--line);
    }

    .output-tabs button {
      border: 0;
      border-right: 1px solid var(--line);
      background: #f8faf6;
    }

    .output-tabs button:last-child {
      border-right: 0;
    }

    .output-tabs button.active {
      background: white;
      color: var(--accent);
      box-shadow: inset 0 -3px 0 var(--accent);
    }

    pre {
      margin: 0;
      min-height: 420px;
      max-height: calc(100vh - 220px);
      overflow: auto;
      background: #111a18;
      color: #e4eee9;
      padding: 12px;
      font-family: var(--mono);
      font-size: 12px;
      line-height: 1.55;
    }

    .status {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      align-items: center;
      padding: 10px 12px;
      border-top: 1px solid var(--line);
      background: #f8faf6;
    }

    .hidden {
      display: none !important;
    }

    @media (max-width: 1180px) {
      .workspace {
        grid-template-columns: 1fr 1fr;
      }

      .output-panel {
        grid-column: 1 / -1;
      }
    }

    @media (max-width: 760px) {
      .topbar {
        align-items: flex-start;
        flex-direction: column;
      }

      .workspace {
        grid-template-columns: 1fr;
        padding: 10px;
      }

      .form-grid,
      .effect-grid {
        grid-template-columns: 1fr;
      }

      pre {
        max-height: none;
      }
    }
  </style>
</head>
<body>
  <div class="app">
    <header class="topbar">
      <div class="brand">
        <h1>技能编辑器</h1>
        <span>技能行 / 效果表 / 条件表 / 修正表</span>
      </div>
      <div class="top-actions">
        <button id="addLineTop" class="primary">新增技能行</button>
        <button id="copyJson">复制 JSON</button>
        <button id="downloadJson">下载配置</button>
        <button id="resetDemo">重置示例</button>
      </div>
    </header>

    <main class="workspace">
      <section class="panel">
        <div class="panel-header">
          <h2>技能基础</h2>
          <span class="pill" id="lineCount">0 行</span>
        </div>
        <div class="panel-body">
          <div class="section form-grid">
            <div class="field">
              <label for="skillId">技能 ID</label>
              <input id="skillId" value="skill_spear_dash_001">
            </div>
            <div class="field">
              <label for="skillName">技能名</label>
              <input id="skillName" value="突进穿刺">
            </div>
            <div class="field">
              <label for="slotType">槽位类型</label>
              <select id="slotType">
                <option value="mainhand_active">主手主动</option>
                <option value="offhand_active">副手主动</option>
                <option value="armor_passive">防具被动</option>
              </select>
            </div>
            <div class="field">
              <label for="skillType">技能类型</label>
              <select id="skillType">
                <option value="melee_attack">近战攻击</option>
                <option value="ranged_attack">远程攻击</option>
                <option value="projectile">投射物</option>
                <option value="ray">射线</option>
                <option value="area">区域</option>
                <option value="aura">光环</option>
                <option value="dash">位移</option>
                <option value="guard">防御</option>
                <option value="counter">反击</option>
                <option value="summon">召唤</option>
                <option value="buff">增益</option>
                <option value="debuff">减益</option>
                <option value="control">控制</option>
                <option value="heal">治疗</option>
                <option value="resource">资源</option>
                <option value="passive_trigger">被动触发</option>
                <option value="modifier">修正规则</option>
              </select>
            </div>
            <div class="field">
              <label for="rarity">稀有度</label>
              <select id="rarity">
                <option value="common">普通</option>
                <option value="rare" selected>稀有</option>
                <option value="epic">史诗</option>
                <option value="legendary">传奇</option>
              </select>
            </div>
            <div class="field">
              <label for="cooldown">冷却</label>
              <input id="cooldown" type="number" step="0.1" value="8">
            </div>
            <div class="field">
              <label for="staminaCost">耐力消耗</label>
              <input id="staminaCost" type="number" step="1" value="15">
            </div>
            <div class="field">
              <label for="manaCost">法力消耗</label>
              <input id="manaCost" type="number" step="1" value="0">
            </div>
            <div class="field">
              <label for="targetDefault">默认目标</label>
              <select id="targetDefault"></select>
            </div>
            <div class="field full">
              <label>主手标签</label>
              <div class="chips" id="weaponTags"></div>
            </div>
            <div class="field full">
              <label>副手标签</label>
              <div class="chips" id="offhandTags"></div>
            </div>
            <div class="field full">
              <label for="skillDesc">描述</label>
              <textarea id="skillDesc">向前突进并对直线路径上的目标造成物理伤害。</textarea>
            </div>
          </div>

          <div class="section">
            <div class="toolbar">
              <button id="addLineLeft" class="primary">新增技能行</button>
              <button id="duplicateLine">复制当前行</button>
              <button id="removeLine" class="danger">删除当前行</button>
            </div>
            <div class="line-list" id="lineList"></div>
          </div>
        </div>
      </section>

      <section class="panel">
        <div class="panel-header">
          <h2>技能行可视化编写</h2>
          <span class="pill" id="selectedLineLabel">未选择</span>
        </div>
        <div class="panel-body builder" id="builder">
          <div class="builder-card">
            <h3>行上下文</h3>
            <div class="form-grid">
              <div class="field">
                <label for="lineContext">上下文</label>
                <select id="lineContext">
                  <option value="main_timeline">主动作线</option>
                  <option value="trigger_line">条件触发线</option>
                  <option value="modifier_line">修正规则线</option>
                </select>
              </div>
              <div class="field">
                <label for="lineName">技能行名称</label>
                <input id="lineName">
              </div>
            </div>
          </div>

          <div class="builder-card">
            <h3>目标与触发</h3>
            <div class="form-grid">
              <div class="field">
                <label for="targetSelector">目标选择器</label>
                <select id="targetSelector"></select>
              </div>
              <div class="field">
                <label for="triggerType">触发器</label>
                <select id="triggerType"></select>
              </div>
              <div class="field">
                <label for="hpRequirement">血量要求</label>
                <input id="hpRequirement" placeholder="目标&lt;0.35 / 自身&gt;0.80">
              </div>
              <div class="field">
                <label for="procChance">触发几率</label>
                <input id="procChance" type="number" min="0" max="1" step="0.01" value="1">
              </div>
            </div>
          </div>

          <div class="builder-card">
            <h3>条件</h3>
            <div class="chips" id="conditionChips"></div>
            <div class="form-grid">
              <div class="field">
                <label for="conditionType">量化条件类型</label>
                <select id="conditionType"></select>
              </div>
              <div class="field">
                <label for="conditionOperator">比较</label>
                <select id="conditionOperator">
                  <option value="gte">&gt;=</option>
                  <option value="lte">&lt;=</option>
                  <option value="gt">&gt;</option>
                  <option value="lt">&lt;</option>
                  <option value="eq">=</option>
                </select>
              </div>
              <div class="field">
                <label for="conditionValue">数值</label>
                <input id="conditionValue" type="number" step="0.01" value="1">
              </div>
              <div class="field">
                <label for="conditionParam">参数</label>
                <input id="conditionParam" placeholder="例：frost / buckler">
              </div>
            </div>
            <div class="toolbar">
              <button id="addCondition">添加量化条件</button>
              <button id="clearConditions" class="danger">清空条件</button>
            </div>
            <div class="line-list" id="quantConditionList"></div>
          </div>

          <div class="builder-card">
            <h3>技能效果块</h3>
            <div class="effect-grid" id="effectButtons"></div>
            <div class="form-grid" id="effectParams"></div>
            <div class="toolbar">
              <button id="addEffectBlock" class="primary">添加效果块</button>
              <button id="clearEffects" class="danger">清空效果</button>
            </div>
            <div class="line-list" id="effectBlockList"></div>
          </div>

          <div class="builder-card">
            <h3>技能联动修正</h3>
            <div class="form-grid">
              <div class="field">
                <label for="modifierTarget">目标技能</label>
                <input id="modifierTarget" placeholder="突进穿刺">
              </div>
              <div class="field">
                <label for="modifierField">修正字段</label>
                <select id="modifierField">
                  <option value="cooldown">冷却</option>
                  <option value="base_ratio">技能倍率</option>
                  <option value="radius">范围</option>
                  <option value="range">距离</option>
                  <option value="proc_chance">触发几率</option>
                  <option value="can_pierce">可穿透</option>
                  <option value="max_targets">目标上限</option>
                  <option value="resource_cost">资源消耗</option>
                </select>
              </div>
              <div class="field">
                <label for="modifierMode">模式</label>
                <select id="modifierMode">
                  <option value="add">add</option>
                  <option value="mul">mul</option>
                  <option value="override">override</option>
                </select>
              </div>
              <div class="field">
                <label for="modifierValue">数值</label>
                <input id="modifierValue" value="-0.20">
              </div>
            </div>
            <div class="toolbar">
              <button id="addModifierBlock">添加联动修正</button>
              <button id="clearModifiers" class="danger">清空修正</button>
            </div>
            <div class="line-list" id="modifierBlockList"></div>
          </div>

          <div class="builder-card">
            <h3>技能行文本</h3>
            <textarea id="lineText"></textarea>
            <div class="toolbar">
              <button id="applyLineText" class="primary">从文本解析</button>
              <button id="syncFromControls">按控件生成</button>
            </div>
          </div>
        </div>
      </section>

      <section class="panel output-panel">
        <div class="panel-header">
          <h2>编译结果</h2>
          <span class="pill" id="validationSummary">0 个问题</span>
        </div>
        <div class="output-tabs">
          <button data-tab="all" class="active">总配置</button>
          <button data-tab="effects">效果表</button>
          <button data-tab="conditions">条件表</button>
          <button data-tab="modifiers">修正表</button>
        </div>
        <pre id="output"></pre>
        <div class="status" id="status"></div>
      </section>
    </main>
  </div>

  <script>
    const targetSelectors = [
      ["", "默认目标"],
      ["自身", "自身"],
      ["当前目标", "当前目标"],
      ["前方单体", "前方单体"],
      ["前方直线", "前方直线"],
      ["前方扇形", "前方扇形"],
      ["圆形范围", "圆形范围"],
      ["周围敌人", "周围敌人"],
      ["周围友方", "周围友方"],
      ["命中目标", "命中目标"],
      ["命中目标周围", "命中目标周围"]
    ];

    const triggerTypes = [
      ["", "无"],
      ["释放时", "释放时"],
      ["前摇开始", "前摇开始"],
      ["前摇结束", "前摇结束"],
      ["命中时", "命中时"],
      ["暴击时", "暴击时"],
      ["击杀时", "击杀时"],
      ["闪避后", "闪避后"],
      ["格挡后", "格挡后"],
      ["受击时", "受击时"],
      ["持续期间每秒", "持续期间每秒"],
      ["效果结束时", "效果结束时"]
    ];

    const conditionOptions = [
      ["has_hit_target", "命中目标", "bool"],
      ["target_hp_ratio", "目标血量比例", "number"],
      ["self_hp_ratio", "自身血量比例", "number"],
      ["target_stack", "目标层数", "stack"],
      ["combo_hit_count", "连击命中数", "number"],
      ["hit_target_count", "命中目标数", "number"],
      ["distance_to_target", "目标距离", "number"],
      ["current_mana_ratio", "当前法力比例", "number"],
      ["current_stamina_ratio", "当前耐力比例", "number"],
      ["offhand_type", "副手类型", "enum"],
      ["talent_active", "天赋已激活", "enum"],
      ["target_has_debuff", "目标存在减益", "enum"],
      ["target_has_control", "目标处于控制", "enum"],
      ["random_seed_bucket", "随机桶", "number"]
    ];

    const weapons = [
      ["light_sword", "轻剑"],
      ["long_blade", "长刀"],
      ["staff", "法杖"],
      ["greatsword", "重剑"],
      ["dagger_main", "匕首"],
      ["club", "棍木"],
      ["bow", "弓箭"],
      ["axe", "斧头"],
      ["greatshield", "重盾"],
      ["spear", "长枪"]
    ];

    const offhands = [
      ["offhand_dagger", "匕首副手"],
      ["buckler", "轻盾"],
      ["grimoire", "法典"],
      ["gauntlet", "护手"]
    ];

    const effectTemplates = [
      {
        id: "physical_damage",
        title: "物理伤害",
        hint: "DealDamage",
        params: [
          ["ratio", "倍率", "number", "1.35"],
          ["flat", "固定值", "number", "0"],
          ["canCrit", "可暴击", "select", "true", ["true", "false"]]
        ],
        build: p => ({ text: `造成物理伤害${num(p.ratio, 1.35)}`, type: "DealDamage", damage_type: "physical", base_ratio: numeric(p.ratio), flat_damage: numeric(p.flat), can_crit: p.canCrit !== "false" })
      },
      {
        id: "magic_damage",
        title: "法术伤害",
        hint: "DealDamage",
        params: [
          ["ratio", "倍率", "number", "0.90"],

    const $ = id => document.getElementById(id);

    function uid(prefix) {
      return `${prefix}_${Math.random().toString(36).slice(2, 8)}_${Date.now().toString(36)}`;
    }

    function num(value, fallback) {
      const parsed = Number(value);
      if (!Number.isFinite(parsed)) return fallback;
      return Number.isInteger(parsed) ? String(parsed) : String(parsed);
    }

    function sanitizeId(text) {
      return String(text || "")
        .trim()
        .toLowerCase()
        .replace(/[^a-z0-9_]+/g, "_")
        .replace(/^_+|_+$/g, "") || "unnamed";
    }

    function init() {
      fillSelect($("targetDefault"), targetSelectors, "前方直线");
      fillSelect($("targetSelector"), targetSelectors, "");
      fillSelect($("triggerType"), triggerTypes, "");
      fillSelect($("conditionType"), conditionOptions.map(([value, label]) => [value, label]), "combo_hit_count");
      renderTagChips("weaponTags", weapons, ["spear"]);
      renderTagChips("offhandTags", offhands, []);
      renderEffectButtons();
      bindEvents();
      render();
    }

    function fillSelect(select, entries, selected) {
      select.innerHTML = entries.map(([value, label]) => {
        return `<option value="${escapeHtml(value)}"${value === selected ? " selected" : ""}>${escapeHtml(label)}</option>`;
      }).join("");
    }

    function renderTagChips(containerId, entries, selected) {
      const container = $(containerId);
      container.innerHTML = entries.map(([value, label]) => {
        const checked = selected.includes(value) ? " checked" : "";
        return `<label class="chip"><input type="checkbox" value="${escapeHtml(value)}"${checked}>${escapeHtml(label)}</label>`;
      }).join("");
      container.addEventListener("change", render);
    }

    function renderEffectButtons() {
      const container = $("effectButtons");
      container.innerHTML = effectTemplates.map(template => {
        return `<button class="effect-button" data-effect="${template.id}">
          <strong>${escapeHtml(template.title)}</strong>
          <span>${escapeHtml(template.hint)}</span>
        </button>`;
      }).join("");
      container.addEventListener("click", event => {
        const button = event.target.closest("button[data-effect]");
        if (!button) return;
        state.effectTemplate = button.dataset.effect;
        const line = selectedLine();
        const template = currentEffectTemplate();
        state.effectParams = {};
        template.params.forEach(param => {
          state.effectParams[param[0]] = param[3];
        });
        render();
      });
    }

    function bindEvents() {
      [
        "skillId",
        "skillName",
        "slotType",
        "skillType",
        "rarity",
        "cooldown",
        "staminaCost",
        "manaCost",
        "targetDefault",
        "skillDesc"
      ].forEach(id => $(id).addEventListener("input", render));

      $("addLineTop").addEventListener("click", addLine);
      $("addLineLeft").addEventListener("click", addLine);
      $("duplicateLine").addEventListener("click", duplicateLine);
      $("removeLine").addEventListener("click", removeLine);
      $("copyJson").addEventListener("click", copyJson);
      $("downloadJson").addEventListener("click", downloadJson);
      $("resetDemo").addEventListener("click", resetDemo);
      $("applyLineText").addEventListener("click", applyLineText);
      $("syncFromControls").addEventListener("click", syncFromControls);
      $("addCondition").addEventListener("click", addQuantCondition);
      $("clearConditions").addEventListener("click", () => {
        const line = selectedLine();
        if (!line) return;
        line.conditions = [];
        render();
      });
      $("addEffectBlock").addEventListener("click", addEffectBlock);
      $("clearEffects").addEventListener("click", () => {
        const line = selectedLine();
        if (!line) return;
        line.effects = [];
        render();
      });
      $("addModifierBlock").addEventListener("click", addModifierBlock);
      $("clearModifiers").addEventListener("click", () => {
        const line = selectedLine();
        if (!line) return;
        line.modifiers = [];
        render();
      });

      ["lineContext", "lineName", "targetSelector", "triggerType", "hpRequirement", "procChance"].forEach(id => {
        $(id).addEventListener("input", updateSelectedFromControls);
      });

      $("lineText").addEventListener("input", event => {
        const line = selectedLine();
        if (!line) return;
        line.rawText = event.target.value;
      });

      document.querySelector(".output-tabs").addEventListener("click", event => {
        const button = event.target.closest("button[data-tab]");
        if (!button) return;
        state.outputTab = button.dataset.tab;
        render();
      });
    }

    function selectedLine() {
      return state.lines.find(line => line.id === state.selectedLineId) || null;
    }

    function addLine() {
      const line = {
        id: uid("line"),
        context: "main_timeline",
        name: $("skillName").value || "新技能行",
        target: "",
        trigger: "",
        conditions: [],
        hp: "",
        chance: 1,
        effects: [
          { id: uid("eff"), text: "造成物理伤害1.0", type: "DealDamage", damage_type: "physical", base_ratio: 1, flat_damage: 0, can_crit: true }
        ],
        modifiers: []
      };
      state.lines.push(line);
      state.selectedLineId = line.id;
      render();
    }

    function duplicateLine() {
      const line = selectedLine();
      if (!line) return;
      const copy = JSON.parse(JSON.stringify(line));
      copy.id = uid("line");
      copy.name = `${copy.name}副本`;
      state.lines.push(copy);
      state.selectedLineId = copy.id;
      render();
    }

    function removeLine() {
      if (state.lines.length <= 1) return;
      state.lines = state.lines.filter(line => line.id !== state.selectedLineId);
      state.selectedLineId = state.lines[0].id;
      render();
    }

    function applyLineText() {
      const line = selectedLine();
      if (!line) return;
      const parsed = parseSkillLine($("lineText").value);
      Object.assign(line, parsed);
      if (!line.context) line.context = $("lineContext").value;
      render();
    }

    function syncFromControls() {
      updateSelectedFromControls();
      const line = selectedLine();
      if (line) {
        $("lineText").value = buildSkillLineText(line);
      }
      render();
    }

    function addQuantCondition() {
      const line = selectedLine();
      if (!line) return;
      const type = $("conditionType").value;
      const entry = conditionOptions.find(item => item[0] === type);
      const label = entry ? entry[1] : type;
      line.conditions.push({
        id: uid("cond"),
        type,
        label,
        operator: $("conditionOperator").value,
        value: numeric($("conditionValue").value),
        param: $("conditionParam").value.trim()
      });
      render();
    }

    function addEffectBlock() {
      const line = selectedLine();
      if (!line) return;
      const template = currentEffectTemplate();
      const built = template.build(state.effectParams);
      line.effects.push({ id: uid("eff"), ...built });
      render();
    }

    function addModifierBlock() {
      const line = selectedLine();
      if (!line) return;
      line.modifiers.push({
        id: uid("mod"),
        target_name: $("modifierTarget").value.trim() || $("skillName").value.trim(),
        modify_field: $("modifierField").value,
        modify_mode: $("modifierMode").value,
        modify_value: parseModifierValue($("modifierValue").value)
      });
      render();
    }

    function updateSelectedFromControls() {
      const line = selectedLine();
      if (!line) return;
      line.context = $("lineContext").value;
      line.name = $("lineName").value;
      line.target = $("targetSelector").value;
      line.trigger = $("triggerType").value;
      line.hp = $("hpRequirement").value.trim();
      line.chance = clampChance($("procChance").value);
      line.rawText = buildSkillLineText(line);
      render();
    }

    function currentEffectTemplate() {
      return effectTemplates.find(template => template.id === state.effectTemplate) || effectTemplates[0];
    }

    function renderEffectParams() {
      const template = currentEffectTemplate();
      const container = $("effectParams");
      container.innerHTML = template.params.map(param => {
        const [key, label, type, fallback, options] = param;

        if (type === "select") {
          return `<div class="field">
            <label>${escapeHtml(label)}</label>
            <select data-effect-param="${escapeHtml(key)}">${options.map(option => `<option value="${escapeHtml(option)}"${option === value ? " selected" : ""}>${escapeHtml(option)}</option>`).join("")}</select>
          </div>`;
        }
        return `<div class="field">
          <label>${escapeHtml(label)}</label>
          <input data-effect-param="${escapeHtml(key)}" type="${type}" step="0.01" value="${escapeHtml(value)}">

    function render() {
      renderLineList();

    function renderLineList() {
      $("lineCount").textContent = `${state.lines.length} 行`;
      $("lineList").innerHTML = state.lines.map((line, index) => {
        const selected = line.id === state.selectedLineId ? " selected" : "";
        return `<article class="skill-line${selected}" data-line-id="${escapeHtml(line.id)}">
          <div class="line-head">
            <div class="line-title">${index + 1}. ${escapeHtml(line.name || "未命名")} · ${escapeHtml(contextLabel(line.context))}</div>
            <div class="line-actions">
              <button data-select="${escapeHtml(line.id)}" title="选择">›</button>
            </div>
          </div>
          <div class="line-body">
            <div class="compiled-line">${escapeHtml(buildSkillLineText(line))}</div>
            <div class="pill-row">${linePills(line).join("")}</div>
          </div>
        </article>`;
      }).join("");

      $("lineList").querySelectorAll("[data-select]").forEach(button => {
        button.addEventListener("click", () => {
          state.selectedLineId = button.dataset.select;
          render();

    function renderBuilder() {
      const line = selectedLine();
      if (!line) return;
      $("selectedLineLabel").textContent = line.name || "未命名";
      $("lineContext").value = line.context || "main_timeline";
      $("lineName").value = line.name || "";
      $("targetSelector").value = line.target || "";
      $("triggerType").value = line.trigger || "";
      $("triggerType").disabled = line.context === "main_timeline";
      $("hpRequirement").value = line.hp || "";
      $("procChance").value = line.chance ?? 1;
      $("lineText").value = line.rawText || buildSkillLineText(line);
      renderQuantConditionList(line);
      renderEffectBlockList(line);
      renderModifierBlockList(line);
    }

    function linePills(line) {
      const warnings = validateLine(line);
      const pills = [
        `<span class="pill">${escapeHtml(contextLabel(line.context))}</span>`,
        line.target ? `<span class="pill">目标 ${escapeHtml(line.target)}</span>` : `<span class="pill warn">默认目标</span>`,
        line.effects.length ? `<span class="pill">${line.effects.length} 个效果</span>` : `<span class="pill bad">缺少效果</span>`,
        line.conditions.length ? `<span class="pill">${line.conditions.length} 个条件</span>` : `<span class="pill warn">无条件</span>`,
        line.modifiers.length ? `<span class="pill">${line.modifiers.length} 个联动</span>` : `<span class="pill">无联动</span>`
      ];
      warnings.forEach(warning => pills.push(`<span class="pill ${warning.level}">${escapeHtml(warning.text)}</span>`));
      return pills;
    }

    function buildSkillLineText(line) {
      const parts = [line.name || $("skillName").value || "未命名技能"];
      if (line.target) parts.push(`目标=${line.target}`);
      if (line.trigger && line.context !== "main_timeline") parts.push(`触发=${line.trigger}`);
      line.conditions.forEach(condition => parts.push(`条件=${conditionToText(condition)}`));
      if (line.hp) parts.push(`血量=${line.hp}`);
      if (line.chance !== "" && line.chance !== undefined && Number(line.chance) !== 1) parts.push(`几率=${line.chance}`);
      line.effects.forEach(effect => parts.push(`效果=${effect.text}`));
      line.modifiers.forEach(modifier => parts.push(`联动=${modifierToText(modifier)}`));
      return parts.join(" ");
    }

    function parseSkillLine(text) {
      const tokens = text.trim().split(/\s+/).filter(Boolean);
      const parsed = {
        name: "",
        target: "",
        trigger: "",
        conditions: [],
        hp: "",
        chance: 1,
        effects: [],
        modifiers: []
      };

      for (const token of tokens) {
        if (token.startsWith("目标=")) parsed.target = token.slice(3);
        else if (token.startsWith("触发=")) parsed.trigger = token.slice(3);
        else if (token.startsWith("条件=")) parsed.conditions.push(token.slice(3));
        else if (token.startsWith("血量=")) parsed.hp = token.slice(3);
        else if (token.startsWith("几率=")) parsed.chance = clampChance(token.slice(3));
        else if (token.startsWith("效果=")) parsed.effects.push(effectFromText(token.slice(3)));
        else if (token.startsWith("联动=")) parsed.modifiers.push(modifierFromText(token.slice(3)));
        else if (!parsed.name) parsed.name = token;
      }

      return parsed;
    }

    function renderQuantConditionList(line) {
      $("quantConditionList").innerHTML = line.conditions.map(condition => {
        return `<article class="skill-line">
          <div class="line-head">
            <div class="line-title">${escapeHtml(conditionToText(condition))}</div>
            <div class="line-actions"><button data-remove-condition="${escapeHtml(condition.id)}">×</button></div>
          </div>
        </article>`;
      }).join("");
      $("quantConditionList").querySelectorAll("[data-remove-condition]").forEach(button => {
        button.addEventListener("click", () => {
          line.conditions = line.conditions.filter(condition => condition.id !== button.dataset.removeCondition);
          render();
        });
      });
    }

    function renderEffectBlockList(line) {
      $("effectBlockList").innerHTML = line.effects.map(effect => {
        return `<article class="skill-line">
          <div class="line-head">
            <div class="line-title">${escapeHtml(effect.text)} · ${escapeHtml(effect.type)}</div>
            <div class="line-actions"><button data-remove-effect="${escapeHtml(effect.id)}">×</button></div>
          </div>
        </article>`;
      }).join("");
      $("effectBlockList").querySelectorAll("[data-remove-effect]").forEach(button => {
        button.addEventListener("click", () => {
          line.effects = line.effects.filter(effect => effect.id !== button.dataset.removeEffect);
          render();
        });
      });
    }

    function renderModifierBlockList(line) {
      $("modifierBlockList").innerHTML = line.modifiers.map(modifier => {
        return `<article class="skill-line">
          <div class="line-head">
            <div class="line-title">${escapeHtml(modifierToText(modifier))}</div>
            <div class="line-actions"><button data-remove-modifier="${escapeHtml(modifier.id)}">×</button></div>
          </div>
        </article>`;
      }).join("");
      $("modifierBlockList").querySelectorAll("[data-remove-modifier]").forEach(button => {
        button.addEventListener("click", () => {
          line.modifiers = line.modifiers.filter(modifier => modifier.id !== button.dataset.removeModifier);
          render();
        });
      });
    }

    function conditionToText(condition) {
      if (typeof condition === "string") return condition;
      const param = condition.param ? `${condition.param}` : "";
      return `${condition.label || condition.type}${param ? `:${param}` : ""}${operatorText(condition.operator)}${condition.value}`;
    }

    function modifierToText(modifier) {
      return `${modifier.target_name || "当前技能"}.${modifier.modify_field} ${modifier.modify_mode} ${modifier.modify_value}`;
    }

    function effectFromText(text) {
      return { id: uid("eff"), text, ...compileEffectPart(text) };
    }

    function modifierFromText(text) {
      return { id: uid("mod"), target_name: "当前技能", modify_field: "custom", modify_mode: "override", modify_value: text };
    }

    function operatorText(operator) {
      return { gte: ">=", lte: "<=", gt: ">", lt: "<", eq: "=" }[operator] || "=";
    }

    function compile() {
      const skill = {
        skill_id: $("skillId").value.trim(),
        skill_name: $("skillName").value.trim(),
        skill_desc: $("skillDesc").value.trim(),
        rarity: $("rarity").value,
        slot_type: $("slotType").value,
        skill_type: $("skillType").value,
        weapon_tags: checkedValues("weaponTags"),
        offhand_tags: checkedValues("offhandTags"),
        cooldown: numeric($("cooldown").value),
        mana_cost: numeric($("manaCost").value),
        stamina_cost: numeric($("staminaCost").value),
        default_target_type: targetMap[$("targetDefault").value] || "forward_line"
      };

      const conditions = [];
      const effects = [];
      const modifiers = [];
      const issues = [];

      state.lines.forEach((line, index) => {
        validateLine(line).forEach(issue => issues.push({ line: index + 1, ...issue }));
        const groupId = compileConditions(line, skill.skill_id, index, conditions);
        effects.push(...compileEffects(line, skill, index, groupId));
        modifiers.push(...compileModifiers(line, skill, index, groupId));
      });

      return {
        skill,
        skill_lines: state.lines.map((line, index) => ({
          skill_line_id: `sl_${skill.skill_id}_${index + 1}`,
          line_context: line.context,
          line_text: buildSkillLineText(line)
        })),
        skill_effects: effects,
        skill_conditions: conditions,
        skill_modifiers: modifiers,
        issues
      };
    }

    function compileConditions(line, skillId, index, out) {
      const records = [];
      if (line.context !== "main_timeline" && line.trigger) {
        records.push({
          condition_type: triggerMap[line.trigger] || sanitizeId(line.trigger),
          param_1: "",
          param_2: "",
          logic_operator: "and"
        });
      }

      line.conditions.forEach(condition => {
        records.push(conditionToRecord(condition));
      });

      if (line.hp) {
        const hp = parseHp(line.hp);
        records.push({
          condition_type: hp.type,
          param_1: hp.value,
          param_2: "",
          logic_operator: "and"
        });
      }

      if (!records.length) return "";
      const groupId = `cg_${skillId}_${index + 1}`;
      records.forEach((record, conditionIndex) => {
        out.push({
          condition_group_id: groupId,
          condition_id: `${groupId}_${conditionIndex + 1}`,
          ...record
        });
      });
      return groupId;
    }

    function compileEffects(line, skill, index, conditionGroupId) {
      const base = {
        skill_id: skill.skill_id,
        trigger_timing: line.context === "main_timeline" ? "timeline" : (triggerMap[line.trigger] || ""),
        target_selector: targetMap[line.target] || skill.default_target_type,
        condition_group_id: conditionGroupId,
        proc_chance: clampChance(line.chance)
      };

      return line.effects.flatMap((effect, effectIndex) => {
        return splitCompositeEffect(effect.text).map((part, partIndex) => ({
          ...base,
          effect_id: `ef_${skill.skill_id}_${index + 1}_${effectIndex + 1}_${partIndex + 1}`,
          ...("type" in effect && part === effect.text ? effectToRecord(effect) : compileEffectPart(part))
        }));
      });
    }

    function compileEffectPart(effect) {
      let match;
      if ((match = effect.match(/^造成物理伤害([0-9.]+)/))) {
        return { effect_type: "DealDamage", damage_type: "physical", base_ratio: numeric(match[1]), flat_damage: 0 };
      }
      if ((match = effect.match(/^造成法术伤害([0-9.]+)/))) {
        return { effect_type: "DealDamage", damage_type: "magical", base_ratio: numeric(match[1]), flat_damage: 0 };
      }
      if ((match = effect.match(/^造成追加伤害([0-9.]+)/))) {
        return { effect_type: "DealExtraDamage", extra_ratio: numeric(match[1]) };
      }
      if ((match = effect.match(/^附加减速([0-9.]+)@([0-9.]+)/))) {
        return { effect_type: "ApplyDebuff", debuff_id: "slow", param_1: numeric(match[1]), duration: numeric(match[2]) };
      }
      if ((match = effect.match(/^附加冻结@([0-9.]+)/))) {
        return { effect_type: "ApplyControl", control_type: "freeze", control_duration: numeric(match[1]) };
      }
      if ((match = effect.match(/^获得护盾([0-9.]+)@([0-9.]+)/))) {
        return { effect_type: "ApplyShield", shield_ratio: numeric(match[1]), duration: numeric(match[2]) };
      }
      if ((match = effect.match(/^自身(前移|后撤)([0-9.]+)/))) {
        return { effect_type: "MoveCaster", move_direction: match[1] === "前移" ? "forward" : "backward", move_distance: numeric(match[2]) };
      }
      if ((match = effect.match(/^开启光环(.+)半径([0-9.]+)@([0-9.]+)/))) {
        return { effect_type: "ApplyAura", aura_id: sanitizeId(match[1]), radius: numeric(match[2]), duration: numeric(match[3]) };
      }
      if ((match = effect.match(/^发射射线长度([0-9.]+)宽度([0-9.]+)伤害([0-9.]+)/))) {
        return { effect_type: "CastRay", length: numeric(match[1]), width: numeric(match[2]), base_ratio: numeric(match[3]), damage_type: "magical" };
      }
      if ((match = effect.match(/^发射投射物(.+)速度([0-9.]+)射程([0-9.]+)伤害([0-9.]+)/))) {
        return { effect_type: "SpawnProjectile", projectile_id: sanitizeId(match[1]), projectile_speed: numeric(match[2]), range: numeric(match[3]), base_ratio: numeric(match[4]) };
      }
      if ((match = effect.match(/^召唤(单位|图腾|机关)(.+)@([0-9.]+)/))) {
        return { effect_type: match[1] === "单位" ? "SummonUnit" : "SummonTotem", summon_id: sanitizeId(match[2]), duration: numeric(match[3]) };
      }
      if ((match = effect.match(/^修改属性(.+)([+-][0-9.]+)@([0-9.]+)/))) {
        return { effect_type: "ModifyAttribute", attribute_type: attrId(match[1]), modify_mode: "add", modify_value: numeric(match[2]), duration: numeric(match[3]) };
      }
      if ((match = effect.match(/^叠加(.+?)([0-9.]+)$/))) {
        return { effect_type: "AddStack", stack_id: stackId(match[1]), stack_count: numeric(match[2]) };
      }
      return { effect_type: "UnknownEffect", raw_effect: effect };
    }

    function effectToRecord(effect) {
      const { id, text, type, ...rest } = effect;
      return { effect_type: type, ...rest };
    }

    function conditionToRecord(condition) {
      if (typeof condition === "string") {
        const mapped = conditionMap[condition];
        if (mapped) {
          return {
            condition_type: mapped[0],
            param_1: mapped[1] ?? "",
            param_2: mapped[2] ?? "",
            logic_operator: "and"
          };
        }
        return {
          condition_type: "custom_condition",
          param_1: condition,
          param_2: "",
          logic_operator: "and"
        };
      }
      return {
        condition_type: condition.type,
        param_1: condition.param || "",
        param_2: condition.value,
        compare_operator: condition.operator,
        logic_operator: "and"
      };
    }

    function splitCompositeEffect(effect) {
      return String(effect || "").split("并").map(part => part.trim()).filter(Boolean);
    }

    function isModifierEffect(effect) {
      return /冷却缩减|范围[+]|可穿透|伤害加成/.test(effect || "");
    }

    function compileModifiers(line, skill, index, conditionGroupId) {
      const modifierEffects = line.effects.filter(effect => effect.type === "Modifier").map(effect => ({
        id: effect.id,
        target_name: effect.target_name,
        modify_field: effect.modify_field,
        modify_mode: effect.modify_mode,
        modify_value: effect.modify_value
      }));
      return [...line.modifiers, ...modifierEffects].map((modifier, modifierIndex) => ({
        modifier_id: `mod_${skill.skill_id}_${index + 1}_${modifierIndex + 1}`,
        source_type: "skill_line",
        source_id: `sl_${skill.skill_id}_${index + 1}`,
        target_skill_id: skillIdFromName(modifier.target_name, skill),
        modify_field: modifier.modify_field,
        modify_mode: modifier.modify_mode,
        modify_value: modifier.modify_value,
        proc_chance: clampChance(line.chance),
        apply_condition_group_id: conditionGroupId
      }));
    }

    function parseHp(value) {
      const match = String(value || "").match(/^(目标|自身)([<>])([0-9.]+)$/);
      if (!match) return { type: "invalid_hp_requirement", value };
      const subject = match[1] === "目标" ? "target" : "self";
      const operator = match[2] === "<" ? "lt" : "gt";
      return { type: `${subject}_hp_ratio_${operator}`, value: numeric(match[3]) };
    }

    function skillIdFromName(name, skill) {
      if (!name || name === skill.skill_name) return skill.skill_id;
      const map = {
        "突进穿刺": "skill_spear_dash_001",
        "霜环": "skill_staff_frost_ring_001",
        "挑空": "skill_spear_launch_001"
      };
      return map[name] || `skill_${sanitizeId(name)}`;
    }

    function attrId(name) {
      const map = {
        "物理攻击": "physical_attack",
        "法术攻击": "magic_attack",
        "物理防御": "physical_defense",
        "法术防御": "magic_defense",
        "移速": "move_speed",
        "伤害免疫": "damage_immunity",
        "伤害加成": "damage_bonus"
      };
      return map[name] || sanitizeId(name);
    }

    function stackId(name) {
      const map = { "寒霜": "frost", "灼烧": "burn", "破甲": "armor_break" };
      return map[name] || sanitizeId(name);
    }

    function validateLine(line) {
      const issues = [];
      if (!line.name) issues.push({ level: "bad", text: "缺少名称" });
      if (!line.effects.length && !line.modifiers.length) issues.push({ level: "bad", text: "缺少效果或联动" });
      if (line.context === "main_timeline" && line.trigger) issues.push({ level: "bad", text: "主动作线禁止触发器" });
      if (Number(line.chance) < 0 || Number(line.chance) > 1) issues.push({ level: "bad", text: "几率越界" });
      if (line.hp && parseHp(line.hp).type === "invalid_hp_requirement") issues.push({ level: "warn", text: "血量表达式异常" });
      if (!line.target && line.effects.some(effect => /伤害|减速|冻结|击退|拉拽/.test(effect.text || ""))) issues.push({ level: "warn", text: "使用默认目标" });
      line.conditions.forEach(condition => {
        if (typeof condition !== "string" && condition.value === "" && condition.type !== "has_hit_target") {
          issues.push({ level: "warn", text: "条件缺少数值" });
        }
      });
      return issues;
    }

    function renderOutput() {
      const result = compile();
      document.querySelectorAll(".output-tabs button").forEach(button => {
        button.classList.toggle("active", button.dataset.tab === state.outputTab);
      });

      const payload = state.outputTab === "effects"
        ? result.skill_effects
        : state.outputTab === "conditions"
          ? result.skill_conditions
          : state.outputTab === "modifiers"
            ? result.skill_modifiers
            : result;

      $("output").textContent = JSON.stringify(payload, null, 2);
      const issueCount = result.issues.length;
      $("validationSummary").textContent = issueCount ? `${issueCount} 个问题` : "0 个问题";
      $("validationSummary").className = `pill${issueCount ? " warn" : ""}`;
      $("status").innerHTML = result.issues.length
        ? result.issues.map(issue => `<span class="pill ${issue.level}">第 ${issue.line} 行：${escapeHtml(issue.text)}</span>`).join("")
        : `<span class="pill">配置可导出</span>`;
    }

    function checkedValues(containerId) {
      return Array.from($(containerId).querySelectorAll("input:checked")).map(input => input.value);
    }

    function numeric(value) {
      const parsed = Number(value);
      return Number.isFinite(parsed) ? parsed : 0;
    }

    function clampChance(value) {
      const parsed = Number(value);
      if (!Number.isFinite(parsed)) return 1;
      return Math.max(0, Math.min(1, parsed));
    }

    function contextLabel(value) {
      return {
        main_timeline: "主动作线",
        trigger_line: "条件触发线",
        modifier_line: "修正规则线"
      }[value] || value;
    }

    function effectKind(effect) {
      if (isModifierEffect(effect)) return "修正";
      if (/光环/.test(effect)) return "光环";
      if (/射线/.test(effect)) return "射线";
      if (/召唤/.test(effect)) return "召唤";
      if (/修改属性/.test(effect)) return "属性";
      if (/移动|前移|后撤|瞬移/.test(effect)) return "移动";
      if (/伤害/.test(effect)) return "伤害";
      return "效果";
    }

    function copyJson() {
      navigator.clipboard.writeText($("output").textContent);
    }

    function downloadJson() {
      const blob = new Blob([$("output").textContent], { type: "application/json;charset=utf-8" });
      const link = document.createElement("a");
      link.href = URL.createObjectURL(blob);
      link.download = `${$("skillId").value || "skill_config"}.json`;
      link.click();
      URL.revokeObjectURL(link.href);
    }

    function resetDemo() {
      location.reload();
    }

    function escapeHtml(value) {
      return String(value ?? "")
        .replace(/&/g, "&amp;")
        .replace(/</g, "&lt;")
        .replace(/>/g, "&gt;")
        .replace(/"/g, "&quot;");
    }

    init();
  </script>
</body>
</html>
