<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>技能编辑器</title>
  <style>
    :root {
      --bg: #edf1ed;
      --panel: #fbfcf8;
      --panel-soft: #f4f7f2;
      --ink: #17211d;
      --muted: #64736d;
      --line: #cad6ce;
      --accent: #206b5a;
      --accent-2: #b84a32;
      --accent-3: #d6a231;
      --ok: #237a4b;
      --warn: #8a6117;
      --bad: #a83127;
      --mono: "Cascadia Mono", "SFMono-Regular", "Liberation Mono", monospace;
      --sans: "Trebuchet MS", "Avenir Next", "Segoe UI", sans-serif;
      --shadow: 0 14px 30px rgba(23, 33, 29, 0.08);
    }

    * {
      box-sizing: border-box;
    }

    html,
    body {
      min-height: 100%;
    }

    body {
      margin: 0;
      color: var(--ink);
      font-family: var(--sans);
      font-size: 14px;
      line-height: 1.42;
      background:
        linear-gradient(130deg, rgba(32, 107, 90, 0.10), transparent 34%),
        linear-gradient(310deg, rgba(214, 162, 49, 0.16), transparent 38%),
        var(--bg);
    }

    button,
    input,
    select,
    textarea {
      font: inherit;
    }

    button {
      min-height: 34px;
      border: 1px solid var(--line);
      background: #fff;
      color: var(--ink);
      padding: 7px 10px;
      cursor: pointer;
    }

    button:hover {
      border-color: var(--accent);
    }

    button.primary {
      color: #fff;
      border-color: var(--accent);
      background: var(--accent);
    }

    button.danger {
      color: var(--bad);
    }

    input,
    select,
    textarea {
      width: 100%;
      min-height: 34px;
      border: 1px solid var(--line);
      background: #fff;
      color: var(--ink);
      padding: 8px 9px;
      outline: none;
    }

    textarea {
      resize: vertical;
      min-height: 72px;
    }

    input:focus,
    select:focus,
    textarea:focus {
      border-color: var(--accent);
      box-shadow: 0 0 0 3px rgba(32, 107, 90, 0.12);
    }

    label {
      color: var(--muted);
      font-size: 12px;
    }

    .topbar {
      position: sticky;
      top: 0;
      z-index: 10;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 14px;
      padding: 14px 18px;
      border-bottom: 1px solid rgba(202, 214, 206, 0.92);
      background: rgba(251, 252, 248, 0.92);
      backdrop-filter: blur(10px);
    }

    .brand {
      display: flex;
      align-items: baseline;
      gap: 10px;
      min-width: 0;
    }

    .brand h1 {
      margin: 0;
      font-size: 18px;
      line-height: 1;
      white-space: nowrap;
    }

    .brand span {
      color: var(--muted);
      font-size: 12px;
      white-space: nowrap;
    }

    .top-actions {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
      justify-content: flex-end;
    }

    .workspace {
      display: grid;
      grid-template-columns: minmax(300px, 0.9fr) minmax(520px, 1.45fr) minmax(390px, 1.05fr);
      gap: 14px;
      padding: 14px;
      align-items: start;
    }

    .panel {
      min-width: 0;
      border: 1px solid var(--line);
      background: rgba(251, 252, 248, 0.96);
      box-shadow: var(--shadow);
    }

    .panel-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 10px;
      padding: 12px;
      border-bottom: 1px solid var(--line);
      background: var(--panel-soft);
    }

    .panel-header h2,
    .card h3 {
      margin: 0;
      font-size: 14px;
    }

    .panel-body {
      padding: 12px;
    }

    .grid {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 10px;
    }

    .field {
      display: grid;
      gap: 5px;
      min-width: 0;
    }

    .full {
      grid-column: 1 / -1;
    }

    .chips,
    .toolbar,
    .pill-row {
      display: flex;
      flex-wrap: wrap;
      gap: 7px;
      align-items: center;
    }

    .chip {
      display: inline-flex;
      align-items: center;
      gap: 5px;
      border: 1px solid var(--line);
      background: #fff;
      padding: 5px 7px;
      font-size: 12px;
      user-select: none;
    }

    .chip input {
      width: auto;
      min-height: auto;
      margin: 0;
    }

    .pill {
      display: inline-flex;
      align-items: center;
      border: 1px solid #c8d8d0;
      background: #e8f0ec;
      color: #22483e;
      min-height: 24px;
      padding: 3px 7px;
      font-size: 12px;
    }

    .pill.warn {
      border-color: #dec16d;
      background: #fbefd4;
      color: var(--warn);
    }

    .pill.bad {
      border-color: #dda59b;
      background: #f8dfda;
      color: var(--bad);
    }

    .card {
      display: grid;
      gap: 10px;
      border: 1px solid var(--line);
      background: #fff;
      padding: 10px;
      margin-bottom: 12px;
    }

    .step-list {
      display: grid;
      gap: 10px;
    }

    .step {
      border: 1px solid var(--line);
      background: #fff;
    }

    .step.selected {
      border-color: var(--accent);
      box-shadow: inset 4px 0 0 var(--accent);
    }

    .step-head {
      display: grid;
      grid-template-columns: 1fr auto;
      gap: 8px;
      align-items: center;
      border-bottom: 1px solid var(--line);
      background: #f8faf6;
      padding: 9px 10px;
    }

    .step-title {
      min-width: 0;
      font-family: var(--mono);
      font-size: 12px;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .step-actions {
      display: flex;
      gap: 5px;
    }

    .step-actions button {
      width: 30px;
      min-height: 28px;
      padding: 0;
    }

    .step-body {
      display: grid;
      gap: 8px;
      padding: 10px;
    }

    .line-preview {
      overflow-x: auto;
      white-space: nowrap;
      background: #17211d;
      color: #e5eee9;
      padding: 8px;
      font-family: var(--mono);
      font-size: 12px;
    }

    .mechanic-grid {
      display: grid;
      grid-template-columns: repeat(3, minmax(0, 1fr));
      gap: 8px;
    }

    .mechanic-button {
      display: grid;
      align-content: center;
      gap: 2px;
      min-height: 52px;
      text-align: left;
      background: #fff;
    }

    .mechanic-button.active {
      border-color: var(--accent);
      box-shadow: inset 3px 0 0 var(--accent);
    }

    .mechanic-button strong {
      font-size: 12px;
    }

    .mechanic-button span {
      color: var(--muted);
      font-size: 11px;
    }

    .mini-list {
      display: grid;
      gap: 7px;
    }

    .mini-item {
      display: grid;
      grid-template-columns: 1fr auto;
      gap: 8px;
      align-items: center;
      border: 1px solid var(--line);
      background: #fbfcf8;
      padding: 7px;
      font-family: var(--mono);
      font-size: 12px;
    }

    .mini-item button {
      width: 28px;
      min-height: 26px;
      padding: 0;
    }

    .tabs {
      display: grid;
      grid-template-columns: repeat(5, 1fr);
      border-bottom: 1px solid var(--line);
    }

    .tabs button {
      border: 0;
      border-right: 1px solid var(--line);
      background: #f8faf6;
    }

    .tabs button:last-child {
      border-right: 0;
    }

    .tabs button.active {
      background: #fff;
      color: var(--accent);
      box-shadow: inset 0 -3px 0 var(--accent);
    }

    pre {
      margin: 0;
      min-height: 470px;
      max-height: calc(100vh - 220px);
      overflow: auto;
      background: #111a17;
      color: #e4eee9;
      padding: 12px;
      font-family: var(--mono);
      font-size: 12px;
      line-height: 1.55;
    }

    .status {
      display: flex;
      flex-wrap: wrap;
      gap: 7px;
      border-top: 1px solid var(--line);
      background: #f8faf6;
      padding: 10px 12px;
    }

    @media (max-width: 1220px) {
      .workspace {
        grid-template-columns: 1fr 1fr;
      }

      .output-panel {
        grid-column: 1 / -1;
      }
    }

    @media (max-width: 760px) {
      .topbar {
        align-items: flex-start;
        flex-direction: column;
      }

      .workspace,
      .grid,
      .mechanic-grid {
        grid-template-columns: 1fr;
      }

      .workspace {
        padding: 10px;
      }

      pre {
        max-height: none;
      }
    }
  </style>
</head>
<body>
  <header class="topbar">
    <div class="brand">
      <h1>技能编辑器</h1>
      <span>触发器 · 目标器 · 量化条件 · 机制效果</span>
    </div>
    <div class="top-actions">
      <button id="addStepTop" class="primary">新增步骤</button>
      <button id="copyJson">复制 JSON</button>
      <button id="downloadJson">下载配置</button>
      <button id="resetDemo">重置示例</button>
    </div>
  </header>

  <main class="workspace">
    <section class="panel">
      <div class="panel-header">
        <h2>技能基础</h2>
        <span class="pill" id="stepCount">0 步</span>
      </div>
      <div class="panel-body">
        <div class="card">
          <div class="grid">
            <div class="field">
              <label for="skillId">技能 ID</label>
              <input id="skillId" value="skill_spear_dash_001">
            </div>
            <div class="field">
              <label for="skillName">技能名</label>
              <input id="skillName" value="突进穿刺">
            </div>
            <div class="field">
              <label for="skillGroup">技能组</label>
              <input id="skillGroup" value="combat.spear">
            </div>
            <div class="field">
              <label for="slotType">槽位</label>
              <select id="slotType">
                <option value="mainhand_active">主手主动</option>
                <option value="offhand_active">副手主动</option>
                <option value="armor_passive">防具被动</option>
              </select>
            </div>
            <div class="field">
              <label for="skillType">技能类型</label>
              <select id="skillType"></select>
            </div>
            <div class="field">
              <label for="cooldown">冷却</label>
              <input id="cooldown" type="number" step="0.1" value="8">
            </div>
            <div class="field">
              <label for="staminaCost">耐力消耗</label>
              <input id="staminaCost" type="number" step="1" value="15">
            </div>
            <div class="field">
              <label for="manaCost">法力消耗</label>
              <input id="manaCost" type="number" step="1" value="0">
            </div>
            <div class="field">
              <label for="globalTrigger">默认触发器</label>
              <select id="globalTrigger"></select>
            </div>
            <div class="field full">
              <label>主手标签</label>
              <div class="chips" id="weaponTags"></div>
            </div>
            <div class="field full">
              <label>副手标签</label>
              <div class="chips" id="offhandTags"></div>
            </div>
            <div class="field full">
              <label for="skillDesc">描述</label>
              <textarea id="skillDesc">向前突进并对直线路径上的敌人造成物理伤害，可通过破军天赋追加低血追击。</textarea>
            </div>
          </div>
        </div>

        <div class="toolbar">
          <button id="addStepLeft" class="primary">新增步骤</button>
          <button id="duplicateStep">复制当前步骤</button>
          <button id="removeStep" class="danger">删除当前步骤</button>
        </div>
        <div class="step-list" id="stepList"></div>
      </div>
    </section>

    <section class="panel">
      <div class="panel-header">
        <h2>技能步骤</h2>
        <span class="pill" id="selectedStepLabel">未选择</span>
      </div>
      <div class="panel-body">
        <div class="card">
          <h3>基础</h3>
          <div class="grid">
            <div class="field">
              <label for="stepName">步骤名</label>
              <input id="stepName">
            </div>
            <div class="field">
              <label for="stepTrigger">触发器</label>
              <select id="stepTrigger"></select>
            </div>
            <div class="field">
              <label for="targeter">目标器</label>
              <select id="targeter"></select>
            </div>
            <div class="field">
              <label for="targetRange">目标距离</label>
              <input id="targetRange" type="number" min="0" step="0.1" value="4">
            </div>
            <div class="field">
              <label for="targetRadius">目标半径</label>
              <input id="targetRadius" type="number" min="0" step="0.1" value="0">
            </div>
            <div class="field">
              <label for="targetAngle">目标角度</label>
              <input id="targetAngle" type="number" min="0" step="1" value="0">
            </div>
            <div class="field">
              <label for="targetWidth">目标宽度</label>
              <input id="targetWidth" type="number" min="0" step="0.1" value="0.6">
            </div>
            <div class="field">
              <label for="maxTargets">目标上限</label>
              <input id="maxTargets" type="number" min="1" step="1" value="1">
            </div>
            <div class="field">
              <label for="chance">触发几率</label>
              <input id="chance" type="number" min="0" max="1" step="0.01" value="1">
            </div>
            <div class="field">
              <label for="delay">延迟</label>
              <input id="delay" type="number" step="0.05" value="0">
            </div>
            <div class="field">
              <label for="repeat">重复次数</label>
              <input id="repeat" type="number" step="1" value="1">
            </div>
            <div class="field">
              <label for="interval">重复间隔</label>
              <input id="interval" type="number" min="0" step="0.05" value="0">
            </div>
          </div>
        </div>

        <div class="card">
          <h3>机制效果</h3>
          <div class="mechanic-grid" id="mechanicButtons"></div>
          <div class="grid" id="mechanicParams"></div>
          <div class="toolbar">
            <button id="applyMechanic" class="primary">应用到当前步骤</button>
          </div>
        </div>

        <div class="card">
          <h3>量化条件</h3>
          <div class="grid">
            <div class="field">
              <label for="conditionScope">作用域</label>
              <select id="conditionScope"></select>
            </div>
            <div class="field">
              <label for="conditionType">条件类型</label>
              <select id="conditionType"></select>
            </div>
            <div class="field">
              <label for="conditionOperator">比较</label>
              <select id="conditionOperator">
                <option value="gte">&gt;=</option>
                <option value="lte">&lt;=</option>
                <option value="gt">&gt;</option>
                <option value="lt">&lt;</option>
                <option value="eq">=</option>
                <option value="neq">!=</option>
              </select>
            </div>
            <div class="field">
              <label for="conditionValue">数值</label>
              <input id="conditionValue" type="number" step="0.01" value="1">
            </div>
            <div class="field">
              <label for="conditionParam">参数</label>
              <input id="conditionParam" placeholder="frost / buckler / tianqu_pojun_core">
            </div>
            <div class="field full">
              <label>条件说明</label>
              <div class="line-preview" id="conditionHelp"></div>
            </div>
          </div>
          <div class="toolbar">
            <button id="addCondition">添加条件</button>
            <button id="clearConditions" class="danger">清空条件</button>
          </div>
          <div class="mini-list" id="conditionList"></div>
        </div>

        <div class="card">
          <h3>技能步骤文本</h3>
          <div class="line-preview" id="skillLinePreview"></div>
        </div>
      </div>
    </section>

    <section class="panel output-panel">
      <div class="panel-header">
        <h2>导出结果</h2>
        <span class="pill" id="validationSummary">0 个问题</span>
      </div>
      <div class="tabs">
        <button data-tab="all" class="active">总配置</button>
        <button data-tab="steps">步骤表</button>
        <button data-tab="mechanics">效果表</button>
        <button data-tab="conditions">条件表</button>
        <button data-tab="text">技能文本</button>
      </div>
      <pre id="output"></pre>
      <div class="status" id="status"></div>
    </section>
  </main>

  <script>
    const skillTypes = [
      ["melee", "近战"],
      ["projectile", "投射物"],
      ["ray", "射线"],
      ["area", "区域"],
      ["aura", "光环"],
      ["dash", "位移"],
      ["guard", "防御"],
      ["counter", "反击"],
      ["summon", "召唤"],
      ["buff", "增益"],
      ["debuff", "减益"],
      ["control", "控制"],
      ["heal", "治疗"],
      ["passive", "被动触发"]
    ];

    const triggers = [
      ["onCast", "释放时"],
      ["onHit", "命中时"],
      ["onCrit", "暴击时"],
      ["onKill", "击杀时"],
      ["onTick", "周期"],
      ["onDamaged", "受击时"],
      ["onDodge", "闪避后"],
      ["onBlock", "格挡后"],
      ["onEnd", "结束时"]
    ];

    const targeters = [
      ["self", "自身"],
      ["current", "当前目标"],
      ["hit", "命中目标"],
      ["line", "前方直线"],
      ["cone", "前方扇形"],
      ["circle", "圆形范围"],
      ["nearEnemies", "周围敌人"],
      ["nearAllies", "周围友方"],
      ["point", "指定点"],
      ["owner", "召唤者"]
    ];

    const conditionScopes = [
      ["caster", "施法者"],
      ["target", "目标"],
      ["skill", "技能"],
      ["world", "场景"]
    ];

    const conditionTypes = [
      { id: "target_hp_ratio", label: "目标血量比例", scope: "target", valueType: "ratio", min: 0, max: 1, step: 0.01, defaultValue: 0.35, operators: ["lte", "lt", "gte", "gt"], paramRequired: false, hint: "判断当前目标生命百分比，常用于斩杀、低血追击。" },
      { id: "caster_hp_ratio", label: "施法者血量比例", scope: "caster", valueType: "ratio", min: 0, max: 1, step: 0.01, defaultValue: 0.5, operators: ["lte", "lt", "gte", "gt"], paramRequired: false, hint: "判断施法者生命百分比，常用于濒死反击和防御被动。" },
      { id: "mana_ratio", label: "法力比例", scope: "caster", valueType: "ratio", min: 0, max: 1, step: 0.01, defaultValue: 0.2, operators: ["gte", "gt", "lte", "lt"], paramRequired: false, hint: "判断施法者当前法力比例。" },
      { id: "stamina_ratio", label: "耐力比例", scope: "caster", valueType: "ratio", min: 0, max: 1, step: 0.01, defaultValue: 0.2, operators: ["gte", "gt", "lte", "lt"], paramRequired: false, hint: "判断施法者当前耐力比例。" },
      { id: "distance", label: "目标距离", scope: "target", valueType: "distance", min: 0, max: 30, step: 0.1, defaultValue: 4, operators: ["lte", "lt", "gte", "gt"], paramRequired: false, hint: "判断施法者与目标的 2D 平面距离。" },
      { id: "target_count", label: "目标数量", scope: "skill", valueType: "count", min: 0, max: 20, step: 1, defaultValue: 1, operators: ["gte", "gt", "lte", "lt", "eq"], paramRequired: false, hint: "判断本次目标器选中的目标数量。" },
      { id: "hit_count", label: "连续命中数", scope: "skill", valueType: "count", min: 0, max: 50, step: 1, defaultValue: 3, operators: ["gte", "gt", "eq"], paramRequired: false, hint: "判断当前技能组或连击窗口内的连续命中次数。" },
      { id: "stack", label: "指定层数", scope: "target", valueType: "count", min: 0, max: 99, step: 1, defaultValue: 1, operators: ["gte", "gt", "lte", "lt", "eq"], paramRequired: true, paramHint: "frost / burn / armor_break", hint: "判断目标身上某类层数。" },
      { id: "has_status", label: "持有状态", scope: "target", valueType: "bool", min: 0, max: 1, step: 1, defaultValue: 1, operators: ["eq", "neq"], paramRequired: true, paramHint: "slow / freeze / shielded", hint: "判断目标是否持有指定状态。" },
      { id: "offhand", label: "副手类型", scope: "caster", valueType: "bool", min: 0, max: 1, step: 1, defaultValue: 1, operators: ["eq", "neq"], paramRequired: true, paramHint: "buckler / grimoire / gauntlet", hint: "判断施法者当前副手标签。" },
      { id: "talent", label: "天赋激活", scope: "skill", valueType: "bool", min: 0, max: 1, step: 1, defaultValue: 1, operators: ["eq", "neq"], paramRequired: true, paramHint: "tianqu_pojun_core", hint: "判断指定天赋节点是否激活。" },

    const $ = id => document.getElementById(id);

    function uid(prefix) {
      return `${prefix}_${Math.random().toString(36).slice(2, 8)}_${Date.now().toString(36)}`;
    }

    function init() {
      fillSelect($("skillType"), skillTypes, "melee");
      fillSelect($("globalTrigger"), triggers, "onCast");
      fillSelect($("stepTrigger"), triggers, "onCast");
      fillSelect($("targeter"), targeters, "line");
      fillSelect($("conditionScope"), conditionScopes, "target");
      fillSelect($("conditionType"), conditionTypes.map(condition => [condition.id, condition.label]), "target_hp_ratio");
      renderTagChips("weaponTags", weapons, ["spear"]);
      renderTagChips("offhandTags", offhands, []);
      renderMechanicButtons();
      bindEvents();
      syncConditionEditor();
      render();

    function fillSelect(select, entries, selected) {
      select.innerHTML = entries.map(([value, label]) => `<option value="${escape(value)}"${value === selected ? " selected" : ""}>${escape(label)}</option>`).join("");
    }

    function renderTagChips(containerId, entries, selected) {
      const container = $(containerId);
      container.innerHTML = entries.map(([value, label]) => {
        const checked = selected.includes(value) ? " checked" : "";
        return `<label class="chip"><input type="checkbox" value="${escape(value)}"${checked}>${escape(label)}</label>`;
      }).join("");
      container.addEventListener("change", render);
    }

    function renderMechanicButtons() {
      $("mechanicButtons").innerHTML = mechanics.map(mechanic => {
        return `<button class="mechanic-button" data-mechanic="${escape(mechanic.id)}"><strong>${escape(mechanic.title)}</strong><span>${escape(mechanic.hint)}</span></button>`;
      }).join("");
      $("mechanicButtons").addEventListener("click", event => {
        const button = event.target.closest("[data-mechanic]");
        if (!button) return;
        state.selectedMechanic = button.dataset.mechanic;
        const mechanic = currentMechanic();
        state.mechanicParams = defaultsFor(mechanic);
        render();
      });
    }

    function bindEvents() {
      ["skillId", "skillName", "skillGroup", "slotType", "skillType", "cooldown", "staminaCost", "manaCost", "globalTrigger", "skillDesc"].forEach(id => {
        $(id).addEventListener("input", render);
      });

      $("addStepTop").addEventListener("click", addStep);
      $("addStepLeft").addEventListener("click", addStep);
      $("duplicateStep").addEventListener("click", duplicateStep);
      $("removeStep").addEventListener("click", removeStep);
      $("copyJson").addEventListener("click", () => navigator.clipboard.writeText($("output").textContent));
      $("downloadJson").addEventListener("click", downloadJson);
      $("resetDemo").addEventListener("click", () => location.reload());
      $("applyMechanic").addEventListener("click", applyMechanicToStep);
      $("addCondition").addEventListener("click", addCondition);
      $("clearConditions").addEventListener("click", clearConditions);

      ["stepName", "stepTrigger", "targeter", "targetRange", "targetRadius", "targetAngle", "targetWidth", "maxTargets", "chance", "delay", "repeat", "interval"].forEach(id => {
        $(id).addEventListener("input", updateSelectedStep);
      });
      $("targeter").addEventListener("change", () => {
        writeTargeterParams(defaultTargeterParams($("targeter").value));
        updateSelectedStep();
      });
      $("conditionType").addEventListener("change", syncConditionEditor);
      $("conditionScope").addEventListener("change", renderOutput);
      $("conditionOperator").addEventListener("change", renderOutput);
      $("conditionValue").addEventListener("input", renderOutput);
      $("conditionParam").addEventListener("input", renderOutput);

      document.querySelector(".tabs").addEventListener("click", event => {
        const button = event.target.closest("[data-tab]");
        if (!button) return;
        state.outputTab = button.dataset.tab;
        render();
      });
    }

    function selectedStep() {
      return state.steps.find(step => step.id === state.selectedStepId) || state.steps[0];
    }

    function currentMechanic() {
      return mechanics.find(mechanic => mechanic.id === state.selectedMechanic) || mechanics[0];
    }

    function defaultsFor(mechanic) {
      const params = {};
      mechanic.params.forEach(([key, , , fallback]) => params[key] = fallback);
      return params;
    }

    function defaultTargeterParams(targeter) {
      const presets = {
        self: { range: 0, radius: 0, angle: 0, width: 0, max_targets: 1 },
        current: { range: 8, radius: 0, angle: 0, width: 0, max_targets: 1 },
        hit: { range: 0, radius: 0, angle: 0, width: 0, max_targets: 1 },
        line: { range: 4, radius: 0, angle: 0, width: 0.6, max_targets: 3 },
        cone: { range: 3.5, radius: 0, angle: 70, width: 0, max_targets: 5 },
        circle: { range: 0, radius: 3, angle: 0, width: 0, max_targets: 6 },
        nearEnemies: { range: 0, radius: 5, angle: 0, width: 0, max_targets: 5 },
        nearAllies: { range: 0, radius: 5, angle: 0, width: 0, max_targets: 5 },
        point: { range: 8, radius: 2, angle: 0, width: 0, max_targets: 6 },
        owner: { range: 0, radius: 0, angle: 0, width: 0, max_targets: 1 }
      };
      return { ...(presets[targeter] || presets.current) };
    }

    function readTargeterParams() {
      return {
        range: Math.max(0, number($("targetRange").value)),
        radius: Math.max(0, number($("targetRadius").value)),
        angle: Math.max(0, number($("targetAngle").value)),
        width: Math.max(0, number($("targetWidth").value)),
        max_targets: Math.max(1, Math.floor(number($("maxTargets").value)))
      };
    }

    function writeTargeterParams(params) {
      $("targetRange").value = params.range;
      $("targetRadius").value = params.radius;
      $("targetAngle").value = params.angle;
      $("targetWidth").value = params.width;
      $("maxTargets").value = params.max_targets;
    }

    function conditionMeta(id) {
      return conditionTypes.find(condition => condition.id === id) || conditionTypes[0];
    }

    function syncConditionEditor() {
      const meta = conditionMeta($("conditionType").value);
      $("conditionScope").value = meta.scope;
      fillSelect($("conditionOperator"), meta.operators.map(operator => [operator, operatorSymbol(operator)]), meta.operators[0]);
      $("conditionValue").type = "number";
      $("conditionValue").min = meta.min;
      $("conditionValue").max = meta.max;
      $("conditionValue").step = meta.step;
      $("conditionValue").value = meta.defaultValue;
      $("conditionParam").placeholder = meta.paramHint || "可选参数";
      $("conditionHelp").textContent = `${meta.label} · ${meta.valueType} · ${meta.hint}${meta.paramRequired ? " · 必须填写参数" : ""}`;
      renderOutput();
    }

    function normalizeConditionValue(value, meta) {
      const parsed = number(value);
      if (meta.valueType === "count") return Math.floor(Math.max(meta.min, Math.min(meta.max, parsed)));
      return Math.max(meta.min, Math.min(meta.max, parsed));
    }

    function addStep() {
      const mechanic = currentMechanic();
      const step = {
        id: uid("step"),
        name: "新技能步骤",
        trigger: $("globalTrigger").value,
        targeter: "current",
        targeter_params: defaultTargeterParams("current"),
        chance: 1,
        delay: 0,
        repeat: 1,
        interval: 0,
        mechanic: { id: mechanic.id, ...normalizedParams(defaultsFor(mechanic)) },
        conditions: []
      };
      state.steps.push(step);
      state.selectedStepId = step.id;
      render();
    }

    function duplicateStep() {
      const step = selectedStep();
      if (!step) return;
      const copy = JSON.parse(JSON.stringify(step));
      copy.id = uid("step");
      copy.name = `${copy.name}副本`;
      copy.conditions.forEach(condition => condition.id = uid("cond"));
      state.steps.push(copy);
      state.selectedStepId = copy.id;
      render();
    }

    function removeStep() {
      if (state.steps.length <= 1) return;
      state.steps = state.steps.filter(step => step.id !== state.selectedStepId);
      state.selectedStepId = state.steps[0].id;
      render();
    }

    function updateSelectedStep() {
      const step = selectedStep();
      if (!step) return;
      step.name = $("stepName").value;
      step.trigger = $("stepTrigger").value;
      step.targeter = $("targeter").value;
      step.targeter_params = readTargeterParams();
      step.chance = clamp01($("chance").value);
      step.delay = number($("delay").value);
      step.repeat = Math.max(1, Math.floor(number($("repeat").value)));
      step.interval = Math.max(0, number($("interval").value));
      render();
    }

    function applyMechanicToStep() {
      const step = selectedStep();
      if (!step) return;
      const mechanic = currentMechanic();
      step.mechanic = { id: mechanic.id, ...normalizedParams(state.mechanicParams) };
      render();
    }

    function addCondition() {
      const step = selectedStep();
      if (!step) return;
      const meta = conditionMeta($("conditionType").value);
      step.conditions.push({
        id: uid("cond"),
        scope: $("conditionScope").value,
        type: $("conditionType").value,
        operator: $("conditionOperator").value,
        value: normalizeConditionValue($("conditionValue").value, meta),
        param: $("conditionParam").value.trim()
      });
      render();
    }

    function clearConditions() {
      const step = selectedStep();
      if (!step) return;
      step.conditions = [];
      render();
    }

    function render() {
      renderStepList();
      renderStepEditor();
      renderMechanicParams();
      renderConditions();
      renderOutput();
    }

    function renderStepList() {
      $("stepCount").textContent = `${state.steps.length} 步`;
      $("stepList").innerHTML = state.steps.map((step, index) => {
        const selected = step.id === state.selectedStepId ? " selected" : "";
        return `<article class="step${selected}">
          <div class="step-head">
            <div class="step-title">${index + 1}. ${escape(step.name)} · ${mechanicLabel(step.mechanic.id)} · ${escape(targeterText(step))} ~${step.trigger}</div>
            <div class="step-actions"><button data-select-step="${escape(step.id)}">›</button></div>
          </div>
          <div class="step-body">
            <div class="line-preview">${escape(stepText(step))}</div>
            <div class="pill-row">
              <span class="pill">${escape(triggerLabel(step.trigger))}</span>
              <span class="pill">${escape(targeterLabel(step.targeter))}</span>
              <span class="pill">${step.conditions.length} 条件</span>
              <span class="pill">${escape(mechanicLabel(step.mechanic.id))}</span>
            </div>
          </div>
        </article>`;
      }).join("");
      document.querySelectorAll("[data-select-step]").forEach(button => {
        button.addEventListener("click", () => {
          state.selectedStepId = button.dataset.selectStep;
          const step = selectedStep();
          state.selectedMechanic = step.mechanic.id;
          state.mechanicParams = denormalizedParams(step.mechanic);
          render();
        });
      });
    }

    function renderStepEditor() {
      const step = selectedStep();
      if (!step) return;
      $("selectedStepLabel").textContent = step.name;
      $("stepName").value = step.name;
      $("stepTrigger").value = step.trigger;
      $("targeter").value = step.targeter;
      writeTargeterParams(normalizedTargeterParams(step));
      $("chance").value = step.chance;
      $("delay").value = step.delay;
      $("repeat").value = step.repeat;
      $("interval").value = step.interval || 0;
      $("skillLinePreview").textContent = stepText(step);
    }

    function renderMechanicParams() {
      const mechanic = currentMechanic();
      document.querySelectorAll("[data-mechanic]").forEach(button => {
        button.classList.toggle("active", button.dataset.mechanic === mechanic.id);
      });
      if (!Object.keys(state.mechanicParams).length) state.mechanicParams = defaultsFor(mechanic);
      $("mechanicParams").innerHTML = mechanic.params.map(([key, label, type, fallback, options]) => {
        const value = state.mechanicParams[key] ?? fallback;
        if (type === "select") {
          return `<div class="field"><label>${escape(label)}</label><select data-param="${escape(key)}">${options.map(([v, l]) => `<option value="${escape(v)}"${String(v) === String(value) ? " selected" : ""}>${escape(l)}</option>`).join("")}</select></div>`;
        }
        return `<div class="field"><label>${escape(label)}</label><input data-param="${escape(key)}" type="${type}" ${type === "number" ? `step="${numberStepFor(key)}" min="0"` : ""} value="${escape(value)}"></div>`;
      }).join("");
      document.querySelectorAll("[data-param]").forEach(input => {
        input.addEventListener("input", () => {
          state.mechanicParams[input.dataset.param] = input.value;
          renderMechanicParams();
        });
      });
    }

    function renderConditions() {
      const step = selectedStep();
      $("conditionList").innerHTML = step.conditions.map(condition => {
        return `<div class="mini-item"><span>${escape(conditionReadable(condition))} · ${escape(conditionText(condition))}</span><button data-remove-condition="${escape(condition.id)}">×</button></div>`;
      }).join("");
      document.querySelectorAll("[data-remove-condition]").forEach(button => {
        button.addEventListener("click", () => {
          step.conditions = step.conditions.filter(condition => condition.id !== button.dataset.removeCondition);
          render();
        });
      });
    }

    function compile() {
      const skill = {
        skill_id: $("skillId").value.trim(),
        skill_name: $("skillName").value.trim(),
        skill_group: $("skillGroup").value.trim(),
        skill_desc: $("skillDesc").value.trim(),
        slot_type: $("slotType").value,
        skill_type: $("skillType").value,
        cooldown: number($("cooldown").value),
        stamina_cost: number($("staminaCost").value),
        mana_cost: number($("manaCost").value),
        default_trigger: $("globalTrigger").value,
        weapon_tags: checked("weaponTags"),
        offhand_tags: checked("offhandTags")
      };

      const steps = [];
      const mechanicsOut = [];
      const conditionsOut = [];
      const conditionGroupsOut = [];
      const issues = [];

      state.steps.forEach((step, index) => {
        const stepId = `step_${skill.skill_id}_${index + 1}`;
        const conditionGroupId = step.conditions.length ? `cg_${skill.skill_id}_${index + 1}` : "";
        validateStep(step, index + 1).forEach(issue => issues.push(issue));
        steps.push({
          step_id: stepId,
          skill_id: skill.skill_id,
          trigger: step.trigger,
          targeter: step.targeter,
          targeter_params: normalizedTargeterParams(step),
          chance: step.chance,
          delay: step.delay,
          repeat: step.repeat,
          interval: step.interval || 0,
          condition_group_id: conditionGroupId
        });
        const mechanicParams = Object.fromEntries(Object.entries(step.mechanic).filter(([key]) => key !== "id"));
        mechanicsOut.push({
          mechanic_id: `mech_${skill.skill_id}_${index + 1}`,
          step_id: stepId,
          skill_id: skill.skill_id,
          mechanic_type: step.mechanic.id,
          mechanic_params: mechanicParams
        });
        if (conditionGroupId) {
          conditionGroupsOut.push({
            condition_group_id: conditionGroupId,
            step_id: stepId,
            skill_id: skill.skill_id,
            logic: "AND"
          });
        }
        step.conditions.forEach((condition, conditionIndex) => {
          conditionsOut.push({
            condition_id: `cond_${skill.skill_id}_${index + 1}_${conditionIndex + 1}`,
            condition_group_id: conditionGroupId,
            step_id: stepId,
            skill_id: skill.skill_id,
            condition_scope: condition.scope || inferredConditionScope(condition.type),
            condition_type: condition.type,
            compare_operator: condition.operator,
            value: condition.value,
            param: condition.param
          });
        });
      });

      return {
        skill,
        skill_steps: steps,
        skill_mechanics: mechanicsOut,
        skill_condition_groups: conditionGroupsOut,
        skill_conditions: conditionsOut,
        skill_text: state.steps.map(stepText),
        issues
      };
    }

    function validateStep(step, line) {
      const issues = [];
      if (!step.name) issues.push({ line, level: "bad", text: "步骤缺少名称" });
      if (!step.mechanic || !step.mechanic.id) issues.push({ line, level: "bad", text: "步骤缺少机制效果" });
      if (step.chance < 0 || step.chance > 1) issues.push({ line, level: "bad", text: "触发几率越界" });
      if (step.repeat < 1) issues.push({ line, level: "bad", text: "重复次数至少为 1" });
      if (step.repeat > 1 && (step.interval || 0) <= 0) issues.push({ line, level: "warn", text: "重复执行建议配置重复间隔" });
      const targeterParams = normalizedTargeterParams(step);
      if (targeterParams.max_targets < 1) issues.push({ line, level: "bad", text: "目标上限至少为 1" });
      if (["line", "cone", "current", "point"].includes(step.targeter) && targeterParams.range <= 0) {
        issues.push({ line, level: "bad", text: "该目标器需要配置目标距离" });
      }
      if (step.targeter === "line" && targeterParams.width <= 0) {
        issues.push({ line, level: "bad", text: "直线目标器需要配置目标宽度" });
      }
      if (step.targeter === "cone" && targeterParams.angle <= 0) {
        issues.push({ line, level: "bad", text: "扇形目标器需要配置目标角度" });
      }
      if (["circle", "nearEnemies", "nearAllies"].includes(step.targeter) && targeterParams.radius <= 0) {
        issues.push({ line, level: "bad", text: "范围目标器需要配置目标半径" });
      }
      if (step.mechanic.id === "meta" && Number(step.mechanic.max_depth) > 3) {
        issues.push({ line, level: "warn", text: "技能组调用深度建议不超过 3" });
      }
      if (["damage", "status", "control", "resource", "stack"].includes(step.mechanic.id) && step.targeter === "self" && step.mechanic.id === "damage") {
        issues.push({ line, level: "warn", text: "伤害机制目标为自身" });
      }
      validateMechanic(step.mechanic, line).forEach(issue => issues.push(issue));
      step.conditions.forEach(condition => {
        validateCondition(condition, line).forEach(issue => issues.push(issue));
      });
      return issues;
    }

    function validateMechanic(mechanic, line) {
      const issues = [];
      const numericFields = ["ratio", "flat", "duration", "tick", "range", "radius", "width", "length", "speed", "distance", "value", "count", "max_count", "max_targets"];
      numericFields.forEach(field => {
        if (field in mechanic && number(mechanic[field]) < 0) issues.push({ line, level: "bad", text: `${mechanic.id}.${field} 不能为负数` });
      });
      if (["area", "aura", "dot"].includes(mechanic.id) && number(mechanic.duration) <= 0) {
        issues.push({ line, level: "bad", text: `${mechanicLabel(mechanic.id)}必须配置持续时间` });
      }
      if (["area", "aura", "dot"].includes(mechanic.id) && number(mechanic.tick) <= 0) {
        issues.push({ line, level: "bad", text: `${mechanicLabel(mechanic.id)}必须配置跳频` });
      }
      if (mechanic.id === "projectile" && number(mechanic.speed) <= 0) issues.push({ line, level: "bad", text: "投射物速度必须大于 0" });
      if (mechanic.id === "projectile" && number(mechanic.range) <= 0) issues.push({ line, level: "bad", text: "投射物射程必须大于 0" });
      if (mechanic.id === "ray" && (number(mechanic.length) <= 0 || number(mechanic.width) <= 0)) issues.push({ line, level: "bad", text: "射线长度和宽度必须大于 0" });
      if (mechanic.id === "summon" && number(mechanic.count) > number(mechanic.max_count)) issues.push({ line, level: "bad", text: "召唤数量不能大于召唤上限" });
      if (mechanic.id === "trap" && !mechanic.effect_ref) issues.push({ line, level: "bad", text: "陷阱必须配置触发技能" });
      if (mechanic.id === "cooldown" && !mechanic.target_skill) issues.push({ line, level: "bad", text: "冷却机制必须配置目标技能" });
      if (mechanic.id === "meta" && !mechanic.skill_ref) issues.push({ line, level: "bad", text: "技能组机制必须配置调用技能" });
      return issues;
    }

    function validateCondition(condition, line) {
      const issues = [];
      const knownMeta = conditionTypes.find(item => item.id === condition.type);
      const meta = knownMeta || conditionTypes[0];
      if (!knownMeta) issues.push({ line, level: "bad", text: `未知条件 ${condition.type}` });
      if (!conditionScopes.some(([scope]) => scope === condition.scope)) issues.push({ line, level: "bad", text: `未知条件作用域 ${condition.scope}` });
      if (!meta.operators.includes(condition.operator)) issues.push({ line, level: "bad", text: `${condition.type} 不支持比较符 ${condition.operator}` });
      if (condition.value < meta.min || condition.value > meta.max) issues.push({ line, level: "bad", text: `${condition.type} 数值超出范围 ${meta.min}-${meta.max}` });
      if (meta.paramRequired && !condition.param) issues.push({ line, level: "bad", text: `${condition.type} 必须填写参数` });
      return issues;
    }

    function renderOutput() {
      const result = compile();
      document.querySelectorAll(".tabs button").forEach(button => {
        button.classList.toggle("active", button.dataset.tab === state.outputTab);
      });
      const payload = {
        all: result,
        steps: result.skill_steps,
        mechanics: result.skill_mechanics,
        conditions: {
          groups: result.skill_condition_groups,
          conditions: result.skill_conditions
        },
        text: result.skill_text
      }[state.outputTab] || result;
      $("output").textContent = Array.isArray(payload) && state.outputTab === "text"
        ? payload.join("\n")
        : JSON.stringify(payload, null, 2);
      $("validationSummary").textContent = result.issues.length ? `${result.issues.length} 个问题` : "0 个问题";
      $("validationSummary").className = `pill${result.issues.length ? " warn" : ""}`;
      $("status").innerHTML = result.issues.length
        ? result.issues.map(issue => `<span class="pill ${issue.level}">第 ${issue.line} 步：${escape(issue.text)}</span>`).join("")
        : `<span class="pill">配置可导出</span>`;
    }

    function stepText(step) {
      const params = Object.entries(step.mechanic)
        .filter(([key]) => key !== "id")
        .map(([key, value]) => `${key}=${value}`)
        .join(";");
      const cond = step.conditions.length
        ? ` ${step.conditions.map(condition => `?${conditionText(condition)}`).join(" ")}`
        : "";
      const timing = [
        step.chance < 1 ? `chance=${step.chance}` : "",
        step.delay > 0 ? `delay=${step.delay}` : "",
        step.repeat > 1 ? `repeat=${step.repeat}` : "",
        step.interval > 0 ? `interval=${step.interval}` : ""
      ].filter(Boolean).join(";");
      return `${step.mechanic.id}{${params}} ${targeterText(step)} ~${step.trigger}${timing ? `{${timing}}` : ""}${cond}`;
    }

    function conditionText(condition) {
      const param = condition.param ? `:${condition.param}` : "";
      return `${condition.scope || inferredConditionScope(condition.type)}.${condition.type}${param}${operatorSymbol(condition.operator)}${condition.value}`;
    }

    function conditionReadable(condition) {
      const meta = conditionMeta(condition.type);
      const scopeLabel = (conditionScopes.find(([scope]) => scope === (condition.scope || meta.scope)) || [condition.scope, condition.scope])[1];
      const param = condition.param ? `(${condition.param})` : "";
      return `${scopeLabel}.${meta.label}${param}`;
    }

    function normalizedTargeterParams(step) {
      const params = { ...defaultTargeterParams(step.targeter), ...(step.targeter_params || {}) };
      return {
        range: number(params.range),
        radius: number(params.radius),
        angle: number(params.angle),
        width: number(params.width),
        max_targets: Math.max(1, Math.floor(number(params.max_targets)))
      };
    }

    function targeterText(step) {
      const params = Object.entries(targeterParamsForText(normalizedTargeterParams(step)))
        .map(([key, value]) => `${key}=${value}`)
        .join(";");
      return `@${step.targeter}${params ? `{${params}}` : ""}`;
    }

    function targeterParamsForText(params) {
      const output = {};
      if (params.range > 0) output.range = params.range;
      if (params.radius > 0) output.radius = params.radius;
      if (params.angle > 0) output.angle = params.angle;
      if (params.width > 0) output.width = params.width;
      if (params.max_targets > 1) output.max = params.max_targets;
      return output;
    }

    function inferredConditionScope(type) {
      return conditionMeta(type).scope || "target";
    }

    function normalizedParams(params) {
      const normalized = {};
      Object.entries(params).forEach(([key, value]) => {
        if (value === "true") normalized[key] = true;
        else if (value === "false") normalized[key] = false;
        else if (value !== "" && !Number.isNaN(Number(value))) normalized[key] = Number(value);
        else normalized[key] = value;
      });
      return normalized;
    }

    function denormalizedParams(mechanic) {
      const result = {};
      Object.entries(mechanic).forEach(([key, value]) => {
        if (key !== "id") result[key] = String(value);
      });
      return result;
    }

    function checked(containerId) {
      return Array.from($(containerId).querySelectorAll("input:checked")).map(input => input.value);
    }

    function number(value) {
      const parsed = Number(value);
      return Number.isFinite(parsed) ? parsed : 0;
    }

    function numberStepFor(key) {
      if (["count", "max_count", "max_targets", "max_stage", "trigger_limit", "max_depth", "max_pierce"].includes(key)) return "1";
      if (["duration", "delay", "interval", "tick", "arm_time"].includes(key)) return "0.05";
      return "0.01";
    }

    function clamp01(value) {
      return Math.max(0, Math.min(1, number(value)));
    }

    function mechanicLabel(id) {
      return (mechanics.find(item => item.id === id) || {}).title || id;
    }

    function triggerLabel(id) {
      return (triggers.find(item => item[0] === id) || [id, id])[1];
    }

    function targeterLabel(id) {
      return (targeters.find(item => item[0] === id) || [id, id])[1];
    }

    function operatorSymbol(operator) {
      return { gte: ">=", lte: "<=", gt: ">", lt: "<", eq: "=", neq: "!=" }[operator] || "=";
    }

    function escape(value) {
      return String(value ?? "")
        .replace(/&/g, "&amp;")
        .replace(/</g, "&lt;")
        .replace(/>/g, "&gt;")
        .replace(/"/g, "&quot;");
    }

    function downloadJson() {
      const blob = new Blob([$("output").textContent], { type: "application/json;charset=utf-8" });
      const link = document.createElement("a");
      link.href = URL.createObjectURL(blob);
      link.download = `${$("skillId").value || "skill_config"}.json`;
      link.click();
      URL.revokeObjectURL(link.href);
    }

    init();
  </script>
</body>
</html>
